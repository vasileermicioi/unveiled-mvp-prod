name = "unveiled-mvp-prod"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public", "no_handle_cross_request_promise_resolution"]

assets = { binding = "ASSETS", directory = "./dist/client" }
observability = { enabled = true }

[[kv_namespaces]]
binding = "SESSION"
id = "replace-with-cloudflare-kv-namespace-id"
preview_id = "replace-with-cloudflare-preview-kv-namespace-id"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "unveiled-assets"
