openapi: 3.1.0
info:
  title: Unveiled API
  version: 0.0.0
tags: []
paths:
  /api/account/login:
    post:
      operationId: AccountRoutes_login
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth.AuthResult'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Auth.LoginRequest'
  /api/account/logout:
    post:
      operationId: AccountRoutes_logout
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth.AuthResult'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Auth.LogoutRequest'
  /api/account/password-recovery:
    post:
      operationId: AccountRoutes_passwordRecovery
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth.AuthResult'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Auth.PasswordRecoveryRequest'
  /api/account/signup:
    post:
      operationId: AccountRoutes_signup
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth.AuthResult'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Auth.SignupRequest'
  /api/admin/assets/upload:
    post:
      operationId: AdminRoutes_uploadAsset
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin.AssetUploadResult'
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Admin.AdminError'
      requestBody:
        required: true
        content:
          '*/*':
            schema:
              contentMediaType: '*/*'
  /api/data-access/{surface}.json:
    get:
      operationId: DataAccessRoutes_querySurface
      parameters:
        - name: surface
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema: {}
  /api/health.json:
    get:
      operationId: HealthRoutes_health
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/System.HealthResult'
  /api/me:
    get:
      operationId: MeRoutes_getMe
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth.AccountMe'
    delete:
      operationId: MeRoutes_deleteAccount
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth.AuthResult'
  /api/me/profile:
    patch:
      operationId: MeRoutes_updateProfile
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Auth.AccountMe'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Auth.UpdateProfileRequest'
  /api/partner/check-in:
    post:
      operationId: PartnerRoutes_checkIn
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Partner.PartnerCheckInResult'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Partner.PartnerCheckInRequest'
  /api/partner/export/bookings:
    get:
      operationId: PartnerRoutes_exportBookings
      parameters:
        - name: eventId
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Common.Id'
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Partner.PartnerExportRow'
  /api/partner/portal:
    get:
      operationId: PartnerRoutes_getPortal
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Partner.PartnerPortal'
  /api/partner/venue-qr/check-in:
    post:
      operationId: PartnerRoutes_venueQrCheckIn
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Partner.VenueQrCheckInResult'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Partner.VenueQrCheckInRequest'
  /api/readiness.json:
    get:
      operationId: ReadinessRoutes_readiness
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/System.ReadinessResult'
  /api/stripe/webhook:
    post:
      operationId: StripeRoutes_stripeWebhook
      parameters:
        - name: stripe-signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                required:
                  - received
        default:
          description: An unexpected error response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhooks.WebhookError'
      requestBody:
        required: true
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/Webhooks.StripeEvent'
  /api/surface/admin:
    post:
      operationId: SurfaceRoutes_admin
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member.AdminSurface'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Surfaces.AdminInput'
  /api/surface/member:
    post:
      operationId: SurfaceRoutes_member
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member.MemberSurface'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Surfaces.MemberInput'
  /api/surface/partner:
    post:
      operationId: SurfaceRoutes_partner
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member.PartnerSurface'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Surfaces.PartnerInput'
  /api/surface/public-discovery:
    post:
      operationId: SurfaceRoutes_publicDiscovery
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member.PublicDiscoverySurface'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Surfaces.PublicDiscoveryInput'
components:
  schemas:
    Admin.AdminError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
        fieldErrors:
          type: object
          unevaluatedProperties:
            type: string
      description: Admin error envelope.
    Admin.AssetUploadResult:
      type: object
      required:
        - url
        - key
        - kind
        - size
        - contentType
      properties:
        url:
          type: string
          description: Public URL of the stored asset.
        key:
          type: string
          description: Object key inside the R2 bucket.
        kind:
          allOf:
            - $ref: '#/components/schemas/Common.AssetKind'
          description: Asset kind discriminator.
        size:
          type: integer
          format: int64
          description: Byte size of the uploaded object.
        contentType:
          type: string
          description: Validated content type.
      description: Asset upload success result.
    Admin.Event:
      type: object
      required:
        - id
        - title
        - category
        - ticketType
        - startAt
        - capacity
        - remainingCapacity
        - ageGroups
        - languages
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: '#/components/schemas/Common.Id'
        title:
          type: string
        description:
          type: string
        category:
          type: string
        ticketType:
          $ref: '#/components/schemas/Common.TicketType'
        startAt:
          $ref: '#/components/schemas/Common.Timestamp'
        endAt:
          $ref: '#/components/schemas/Common.Timestamp'
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          $ref: '#/components/schemas/Common.CountryCode'
        neighborhood:
          type: string
        imageUrl:
          type: string
        capacity:
          type: integer
          format: int32
        remainingCapacity:
          type: integer
          format: int32
        partnerId:
          $ref: '#/components/schemas/Common.Id'
        partnerName:
          type: string
        ageGroups:
          type: array
          items:
            type: string
        languages:
          type: array
          items:
            type: string
        promoCode:
          type: string
        secretCode:
          type: string
        secretCodeMode:
          type: string
          enum:
            - PASSWORD
            - CODE
        eventWebsiteUrl:
          type: string
        createdAt:
          $ref: '#/components/schemas/Common.Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Common.Timestamp'
      description: Event record exposed over the wire.
    Admin.Partner:
      type: object
      required:
        - id
        - name
        - contactEmail
        - portalAccessEnabled
        - createdAt
        - updatedAt
      properties:
        id:
          $ref: '#/components/schemas/Common.Id'
        name:
          type: string
        contactEmail:
          $ref: '#/components/schemas/Common.Email'
        contactPhone:
          $ref: '#/components/schemas/Common.PhoneNumber'
        websiteUrl:
          type: string
        logoUrl:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          $ref: '#/components/schemas/Common.CountryCode'
        description:
          type: string
        portalAccessEnabled:
          type: boolean
        venueToken:
          type: string
        createdAt:
          $ref: '#/components/schemas/Common.Timestamp'
        updatedAt:
          $ref: '#/components/schemas/Common.Timestamp'
      description: Partner record exposed over the wire.
    AstroActions.AdminTicketInput:
      type: object
      required:
        - userId
        - eventId
        - ticketQuantity
        - consumeCapacity
        - debitCredits
        - idempotencyKey
      properties:
        userId:
          $ref: '#/components/schemas/Common.Id'
        eventId:
          $ref: '#/components/schemas/Common.Id'
        ticketQuantity:
          type: integer
          format: int32
        consumeCapacity:
          type: boolean
        debitCredits:
          type: boolean
        idempotencyKey:
          type: string
    AstroActions.BookingActionInput:
      type: object
      required:
        - eventId
        - ticketQuantity
        - idempotencyKey
      properties:
        eventId:
          $ref: '#/components/schemas/Common.Id'
        ticketQuantity:
          type: integer
          format: int32
        idempotencyKey:
          type: string
    AstroActions.CheckInInput:
      type: object
      required:
        - bookingId
      properties:
        bookingId:
          $ref: '#/components/schemas/Common.Id'
    AstroActions.CreditAdjustmentInput:
      type: object
      required:
        - userId
        - amount
        - reason
        - idempotencyKey
      properties:
        userId:
          $ref: '#/components/schemas/Common.Id'
        amount:
          type: integer
          format: int32
        reason:
          type: string
        idempotencyKey:
          type: string
    AstroActions.DeleteEventInput:
      type: object
      required:
        - eventId
      properties:
        eventId:
          $ref: '#/components/schemas/Common.Id'
    AstroActions.DeletePartnerInput:
      type: object
      required:
        - partnerId
      properties:
        partnerId:
          $ref: '#/components/schemas/Common.Id'
    AstroActions.EventFormInput:
      type: object
      required:
        - title
        - category
        - ticketType
        - startAt
        - capacity
        - ageGroups
        - languages
      properties:
        id:
          $ref: '#/components/schemas/Common.Id'
        title:
          type: string
        description:
          type: string
        category:
          type: string
        ticketType:
          $ref: '#/components/schemas/Common.TicketType'
        startAt:
          $ref: '#/components/schemas/Common.Timestamp'
        endAt:
          $ref: '#/components/schemas/Common.Timestamp'
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          $ref: '#/components/schemas/Common.CountryCode'
        neighborhood:
          type: string
        imageUrl:
          type: string
        capacity:
          type: integer
          format: int32
        partnerId:
          $ref: '#/components/schemas/Common.Id'
        ageGroups:
          type: array
          items:
            type: string
        languages:
          type: array
          items:
            type: string
        promoCode:
          type: string
        secretCode:
          type: string
        secretCodeMode:
          type: string
        eventWebsiteUrl:
          type: string
        seriesLength:
          type: integer
          format: int32
        seriesIntervalDays:
          type: integer
          format: int32
    AstroActions.GetAdminExportRowsInput:
      type: object
      properties:
        partnerId:
          $ref: '#/components/schemas/Common.Id'
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
    AstroActions.GetPartnerBookingExportRowsInput:
      type: object
      properties:
        eventId:
          $ref: '#/components/schemas/Common.Id'
    AstroActions.ListUsersInput:
      type: object
      properties:
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
    AstroActions.LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          $ref: '#/components/schemas/Common.Email'
        password:
          type: string
        callbackURL:
          type: string
    AstroActions.LogoutInput:
      type: object
      properties:
        _placeholder:
          type: string
    AstroActions.MemberAdminInput:
      type: object
      required:
        - userId
        - role
        - subscriptionStatus
        - creditAdjustment
      properties:
        userId:
          $ref: '#/components/schemas/Common.Id'
        role:
          $ref: '#/components/schemas/Common.Role'
        subscriptionStatus:
          $ref: '#/components/schemas/Common.SubscriptionStatus'
        creditAdjustment:
          type: integer
          format: int32
        reason:
          type: string
    AstroActions.MembershipInput:
      type: object
      properties:
        promoCode:
          type: string
    AstroActions.OnboardingInput:
      type: object
      required:
        - interests
        - moods
        - districts
        - maxDistance
        - timing
        - days
        - preferredLanguages
        - ageGroup
        - accessibility
        - onboardingComplete
      properties:
        interests:
          type: array
          items:
            type: string
        moods:
          type: array
          items:
            type: string
        districts:
          type: array
          items:
            type: string
        maxDistance:
          type: integer
          format: int32
        timing:
          type: string
        days:
          type: array
          items:
            type: string
        preferredLanguages:
          type: array
          items:
            type: string
        ageGroup:
          type: string
        accessibility:
          type: array
          items:
            type: string
        onboardingComplete:
          type: boolean
    AstroActions.PartnerFormInput:
      type: object
      required:
        - name
        - contactEmail
        - portalAccessEnabled
      properties:
        id:
          $ref: '#/components/schemas/Common.Id'
        name:
          type: string
        contactEmail:
          $ref: '#/components/schemas/Common.Email'
        contactPhone:
          $ref: '#/components/schemas/Common.PhoneNumber'
        websiteUrl:
          type: string
        logoUrl:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          $ref: '#/components/schemas/Common.CountryCode'
        description:
          type: string
        portalAccessEnabled:
          type: boolean
    AstroActions.PartnerPortalAccessInput:
      type: object
      required:
        - partnerId
        - email
        - name
      properties:
        partnerId:
          $ref: '#/components/schemas/Common.Id'
        email:
          $ref: '#/components/schemas/Common.Email'
        name:
          type: string
    AstroActions.PartnerTokenInput:
      type: object
      required:
        - partnerId
      properties:
        partnerId:
          $ref: '#/components/schemas/Common.Id'
    AstroActions.PasswordRecoveryInput:
      type: object
      required:
        - email
      properties:
        email:
          $ref: '#/components/schemas/Common.Email'
        redirectTo:
          type: string
    AstroActions.PreferencesInput:
      type: object
      required:
        - interests
        - moods
        - districts
        - maxDistance
        - timing
        - days
        - preferredLanguages
        - ageGroup
        - accessibility
      properties:
        interests:
          type: array
          items:
            type: string
        moods:
          type: array
          items:
            type: string
        districts:
          type: array
          items:
            type: string
        maxDistance:
          type: integer
          format: int32
        timing:
          type: string
        days:
          type: array
          items:
            type: string
        preferredLanguages:
          type: array
          items:
            type: string
        ageGroup:
          type: string
        accessibility:
          type: array
          items:
            type: string
    AstroActions.ProfileInput:
      type: object
      required:
        - language
        - newsletterOptIn
      properties:
        firstName:
          type: string
        lastName:
          type: string
        language:
          $ref: '#/components/schemas/Common.Language'
        billingAddress:
          $ref: '#/components/schemas/Auth.BillingAddress'
        newsletterOptIn:
          type: boolean
    AstroActions.SavedEventActionInput:
      type: object
      required:
        - eventId
      properties:
        eventId:
          $ref: '#/components/schemas/Common.Id'
    AstroActions.SetLanguageInput:
      type: object
      required:
        - language
      properties:
        language:
          $ref: '#/components/schemas/Common.Language'
    AstroActions.SignupInput:
      type: object
      required:
        - email
        - password
        - firstName
        - lastName
      properties:
        email:
          $ref: '#/components/schemas/Common.Email'
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        callbackURL:
          type: string
    AstroActions.ToggleUserFreezeInput:
      type: object
      required:
        - userId
        - frozen
      properties:
        userId:
          $ref: '#/components/schemas/Common.Id'
        frozen:
          type: boolean
        reason:
          type: string
    AstroActions.TrackEventOpenInput:
      type: object
      required:
        - eventId
        - viewName
      properties:
        eventId:
          $ref: '#/components/schemas/Common.Id'
        viewName:
          type: string
    AstroActions.TrackFilterApplyInput:
      type: object
      required:
        - filters
        - viewName
      properties:
        filters:
          type: object
          unevaluatedProperties:
            type: string
        viewName:
          type: string
    AstroActions.VenueQrCheckInInput:
      type: object
      required:
        - partnerId
        - venueToken
      properties:
        partnerId:
          $ref: '#/components/schemas/Common.Id'
        venueToken:
          type: string
    AstroActions.WaitlistActionInput:
      type: object
      required:
        - eventId
        - ticketQuantity
      properties:
        eventId:
          $ref: '#/components/schemas/Common.Id'
        ticketQuantity:
          type: integer
          format: int32
    Auth.AccountMe:
      type: object
      required:
        - user
        - profile
      properties:
        user:
          allOf:
            - $ref: '#/components/schemas/Auth.User'
          description: The authenticated user.
        profile:
          allOf:
            - $ref: '#/components/schemas/Auth.Profile'
          description: The user's profile.
      description: Account me response (placeholder for 09-iteration).
    Auth.AuthResult:
      type: object
      required:
        - state
      properties:
        state:
          allOf:
            - $ref: '#/components/schemas/Auth.AuthState'
          description: Auth state envelope.
        user:
          allOf:
            - $ref: '#/components/schemas/Auth.User'
          description: Authenticated user, when login/signup succeeded.
        session:
          allOf:
            - $ref: '#/components/schemas/Auth.Session'
          description: Newly created session, when login/signup succeeded.
        nextPath:
          type: string
          description: Path to navigate to after success.
      description: Generic auth result with optional user/session and next path.
    Auth.AuthState:
      type: object
      required:
        - ok
        - status
      properties:
        ok:
          type: boolean
          description: True when authentication succeeded.
        status:
          type: string
          enum:
            - idle
            - loading
            - success
            - error
            - unauthenticated
            - forbidden
          description: State discriminator.
        message:
          type: string
          description: Top-level error message.
        fieldErrors:
          type: object
          unevaluatedProperties:
            type: string
          description: Optional field-level error map.
        nextPath:
          type: string
          description: Redirect target after success.
      description: Auth state used in API responses.
    Auth.BillingAddress:
      type: object
      properties:
        name:
          type: string
        country:
          $ref: '#/components/schemas/Common.CountryCode'
        postalCode:
          type: string
        city:
          type: string
        line1:
          type: string
        line2:
          type: string
      description: Billing address fields stored on the profile.
    Auth.LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          allOf:
            - $ref: '#/components/schemas/Common.Email'
          description: User email.
        password:
          type: string
          description: User password (min 8 characters).
        callbackURL:
          type: string
          description: Optional URL to redirect to after success.
      description: Login request body.
    Auth.LogoutRequest:
      type: object
      properties:
        _placeholder:
          type: string
          description: Empty marker for the logout endpoint.
      description: Logout request body (empty).
    Auth.PasswordRecoveryRequest:
      type: object
      required:
        - email
      properties:
        email:
          allOf:
            - $ref: '#/components/schemas/Common.Email'
          description: Email address to send the recovery link to.
        redirectTo:
          type: string
          description: Optional URL the recovery link redirects to.
      description: Password recovery request body.
    Auth.Profile:
      type: object
      required:
        - userId
        - language
        - newsletterOptIn
