        - provider
        - eventId
        - type
        - payload
        - receivedAt
        - processed
      properties:
        provider:
          type: string
          description: Provider identifier (e.g. `stripe`).
        eventId:
          type: string
          description: Provider event id (e.g. `evt_...`).
        type:
          type: string
          description: Event type reported by the provider.
        payload:
          description: Raw event payload as received from the provider.
        receivedAt:
          allOf:
            - $ref: '#/components/schemas/Common.Timestamp'
          description: Receipt timestamp.
        processed:
          type: boolean
          description: True once the event has been processed.
      description: Provider event record persisted for idempotency.
    Webhooks.StripeCustomer:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        email:
          $ref: '#/components/schemas/Common.Email'
        name:
          type: string
        address:
          type: object
          properties:
            country:
              $ref: '#/components/schemas/Common.CountryCode'
            postal_code:
              type: string
            city:
              type: string
            line1:
              type: string
            line2:
              type: string
        default_payment_method:
          type: string
        invoice_settings:
          type: object
          properties:
            default_payment_method:
              type: string
      description: Stripe customer (subset of Stripe API response).
    Webhooks.StripeEvent:
      anyOf:
        - type: object
          properties:
            type:
              type: string
              enum:
                - invoice.payment_succeeded
                - invoice.payment_failed
            data:
              type: object
              properties:
                object:
                  $ref: '#/components/schemas/Webhooks.StripeInvoice'
              required:
                - object
          required:
            - type
            - data
        - type: object
          properties:
            type:
              type: string
              enum:
                - customer.subscription.created
                - customer.subscription.updated
                - customer.subscription.deleted
            data:
              type: object
              properties:
                object:
                  $ref: '#/components/schemas/Webhooks.StripeSubscription'
              required:
                - object
          required:
            - type
            - data
        - type: object
          properties:
            type:
              type: string
              enum:
                - payment_method.attached
                - payment_method.detached
            data:
              type: object
              properties:
                object:
                  $ref: '#/components/schemas/Webhooks.StripePaymentMethod'
              required:
                - object
          required:
            - type
            - data
        - type: object
          properties:
            type:
              type: string
              enum:
                - customer.updated
            data:
              type: object
              properties:
                object:
                  $ref: '#/components/schemas/Webhooks.StripeCustomer'
              required:
                - object
          required:
            - type
            - data
      description: Discriminated union of supported Stripe event types.
    Webhooks.StripeInvoice:
      type: object
      required:
        - id
        - customer
        - subscription
        - amount_paid
        - status
        - metadata
      properties:
        id:
          type: string
        customer:
          type: string
        subscription:
          type: string
        amount_paid:
          type: integer
          format: int64
        status:
          type: string
        metadata:
          type: object
          unevaluatedProperties:
            type: string
      description: Stripe invoice record (subset of Stripe API response).
    Webhooks.StripePaymentMethod:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
        type:
          type: string
        card:
          type: object
          properties:
            brand:
              type: string
            last4:
              type: string
            exp_month:
              type: integer
              format: int32
            exp_year:
              type: integer
              format: int32
          required:
            - brand
            - last4
            - exp_month
            - exp_year
        sepa_debit:
          type: object
          properties:
            last4:
              type: string
            bank_code:
              type: string
          required:
            - last4
      description: Stripe payment method (subset of Stripe API response).
    Webhooks.StripeSubscription:
      type: object
      required:
        - id
        - customer
        - status
        - current_period_start
        - current_period_end
        - cancel_at_period_end
        - items
      properties:
        id:
          type: string
        customer:
          type: string
        status:
          type: string
        current_period_start:
          type: integer
          format: int64
        current_period_end:
          type: integer
          format: int64
        cancel_at_period_end:
          type: boolean
        canceled_at:
          type: integer
          format: int64
        items:
          type: object
          properties:
            data:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  price:
                    type: object
                    properties:
                      id:
                        type: string
                    required:
                      - id
                required:
                  - id
                  - price
          required:
            - data
      description: Stripe subscription record (subset of Stripe API response).
    Webhooks.WebhookError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
      description: Webhook error envelope.
