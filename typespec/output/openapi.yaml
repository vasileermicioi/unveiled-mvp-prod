        status:
          type: string
          enum:
            - ready
            - degraded
          description: '`ready` when dependencies are reachable.'
        checks:
          type: object
          unevaluatedProperties:
            type: object
            properties:
              ok:
                type: boolean
              message:
                type: string
            required:
              - ok
          description: Per-dependency status map.
      description: Readiness probe result.
