name = "unveiled-api"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public", "no_handle_cross_request_promise_resolution"]
main = "packages/api/dist/worker.js"
observability = { enabled = true }

[[kv_namespaces]]
binding = "SESSION"
id = "b25ac2e3eb4b4df082254d32c7fd6766"
preview_id = "a970664d170d4d18833718fb6b0cd0ee"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "unveiled-dev"

# Cloudflare secrets (not declared as [vars]): BETTER_AUTH_SECRET, STRIPE_SECRET_KEY, RESEND_API_KEY
[env.production.vars]
BETTER_AUTH_TRUSTED_ORIGINS = ""
PUBLIC_ORCHESTRATOR_URL = ""
DATABASE_URL = ""
BETTER_AUTH_URL = ""
PUBLIC_ASSET_BASE_URL = ""
AUTH_COOKIE_DOMAIN = ""

[env.staging.vars]
BETTER_AUTH_TRUSTED_ORIGINS = ""
PUBLIC_ORCHESTRATOR_URL = ""