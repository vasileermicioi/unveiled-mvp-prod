context: |
  Tech stack: Astro 6 (Cloudflare Workers adapter), React 19 islands, Drizzle ORM (Neon Postgres),
  TanStack Query, Better Auth, Stripe Billing, Zod 4, Biome, TypeSpec (openapi3 + json-schema emitters).

  Architecture: SSR pages under `src/pages/`, typed server actions under `src/actions/index.ts`,
  HTTP endpoints under `src/pages/api/`, data-access layer under `src/lib/data-access/`,
  domain models under `drizzle/` and `src/db/schema.ts`, display view models under
  `src/lib/unveiled-view-models.ts` and `src/lib/app-shell-view-models.ts`.

  TypeSpec contract: the `typespec/` directory is the source of truth for every HTTP route and
  Astro Action. Generated output lives under `typespec/output/` (committed) and `src/lib/generated/`
  (committed Zod validators + type-only TypeScript). Drift is detected by `bun run specs:check`
  (wired into `bun run check`). The OpenAPI document is served at `/api/openapi.json`.

  When adding or changing a route, update the matching TypeSpec file under `typespec/**` and run
  `bun run specs:gen` to regenerate the committed artifacts. Do not edit generated files by hand.

  Project entrypoint: `AGENTS.md` at the repo root is the canonical contributor manual
  (tech stack, file layout, conventions, OpenSpec workflow, iteration cycle, toolchain
  commands, definition of done). `CONTRIBUTING.md` mirrors it for humans with the
  PR / review / release specifics. This `context:` block is a compact machine summary —
  read `AGENTS.md` for full detail. Update `AGENTS.md` first whenever the stack, file
  layout, iteration cycle, or definition of done changes.

